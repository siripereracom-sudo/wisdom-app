<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wisdom App — Live2D</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- Live2D Cubism Core -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>Wisdom App — Live2D</h1>
      <p class="sub">PIXI + Live2D + Lip Sync</p>
    </header>

    <main class="grid">
      <section class="card stage">
        <div class="stage-head">
          <div class="label">Avatar Stage</div>
          <div class="row">
            <button id="btnReload" class="btn">Reload model</button>
            <button id="btnDump" class="btn btnGhost">Dump params</button>
          </div>
        </div>

        <div id="stage" class="canvasWrap">
  <img src="guru.png" id="guruImage" />
</div>

        <div class="hint">
          Model URL:
          <span id="modelUrl" class="mono">model/Haru/Haru.model3.json</span>
        </div>
      </section>

      <section class="card controls">
        <div class="label">Controls</div>

        <div class="field">
          <label>Audio lip-sync test</label>
          <div class="row">
            <input id="audioFile" type="file" accept="audio/*" />
            <button id="btnPlay" class="btn">Play & lip-sync</button>
            <button id="btnStop" class="btn btnGhost">Stop</button>
          </div>
        </div>

        <div class="field">
          <label>Mouth sanity test</label>
          <input id="mouthSlider" type="range" min="0" max="75" value="5" />
          <div class="row">
            <span class="small">OpenY:</span>
            <span id="mouthVal" class="mono small">0.05</span>
          </div>
        </div>

        <div class="log">
          <div class="label">Log</div>
          <pre id="log"></pre>
        </div>
      </section>
    </main>
  </div>
    <!-- ADD THIS BLOCK -->
  <script>
    PIXI.live2d.Live2DModel.from("Haru/Haru.model3.json").then(model => {
      // Create PIXI app if not already created in app.js
      if (!window.app) {
        window.app = new PIXI.Application({
          view: document.getElementById("stage"),
          autoStart: true,
          resizeTo: document.getElementById("stage")
        });
      }

      app.stage.addChild(model);
    });
  </script>

  <!-- Your existing script -->
  <script type="module" src="./app.js"></script>

</body>

</html>
