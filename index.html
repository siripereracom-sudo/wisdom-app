<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guru Nanak App</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Guru Nanak App</h1>
        <p class="sub">Sacred portrait prototype with future lip sync and subtle animation.</p>
      </div>
      <div class="pill">Portrait Mode</div>
    </header>

    <main class="grid">
      <section class="card stage">
        <div class="stage-head">
          <div class="label">Portrait Stage</div>
          <div class="row">
            <button id="btnReload" class="btn">Reload image</button>
          </div>
        </div>

        <div id="stage" class="canvasWrap">
          <img src="guru.png" id="guruImage" alt="Guru Nanak portrait" />
        </div>

        <div class="hint">
          Image URL:
          <span id="imageUrl" class="mono">guru.png</span>
        </div>
      </section>

      <section class="card controls">
        <div class="label">Controls</div>

        <div class="field">
          <label>Audio lip-sync test</label>
          <div class="row">
            <input id="audioFile" type="file" accept="audio/*" />
            <button id="btnPlay" class="btn">Play</button>
            <button id="btnStop" class="btn btnGhost">Stop</button>
          </div>
          <div class="small">
            This is the portrait prototype. Animation will be added later.
          </div>
        </div>

        <div class="field">
          <label>Image size test</label>
          <input id="sizeSlider" type="range" min="30" max="100" value="78" />
          <div class="row">
            <span class="small">Scale:</span>
            <span id="sizeVal" class="mono small">78%</span>
          </div>
        </div>

        <div class="log">
          <div class="label">Log</div>
          <pre id="log"></pre>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js?v=20001"></script>
</body>
</html>
